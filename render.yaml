# Render Blueprint for News Digest Engine
services:
  - type: web
    name: news-digest-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: true